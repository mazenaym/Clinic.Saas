<!DOCTYPE html>

<html dir="rtl" lang="ar"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>ClinicFlow - تسجيل الدخول</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

                    "on-surface": "#191b24",
                    "inverse-primary": "#b3c5ff",
                    "surface": "#faf8ff",
                    "primary-container": "#0066ff",
                    "secondary-container": "#c5dcfd",
                    "background": "#faf8ff",
                    "tertiary-fixed": "#ffdbd0",
                    "primary-fixed-dim": "#b3c5ff",
                    "on-error-container": "#93000a",
                    "primary-fixed": "#dae1ff",
                    "on-background": "#191b24",
                    "surface-container-high": "#e6e7f4",
                    "tertiary": "#a33200",
                    "on-tertiary-fixed": "#390c00",
                    "surface-bright": "#faf8ff",
                    "on-primary-container": "#f8f7ff",
                    "secondary-fixed-dim": "#b1c8e9",
                    "on-tertiary-container": "#fff6f4",
                    "surface-variant": "#e1e2ee",
                    "on-secondary-fixed": "#021c36",
                    "surface-container-lowest": "#ffffff",
                    "on-secondary-fixed-variant": "#324863",
                    "inverse-on-surface": "#eff0fd",
                    "primary": "#0050cb",
                    "surface-dim": "#d8d9e6",
                    "secondary-fixed": "#d2e4ff",
                    "on-secondary": "#ffffff",
                    "on-tertiary": "#ffffff",
                    "secondary": "#4a607c",
                    "tertiary-fixed-dim": "#ffb59d",
                    "tertiary-container": "#cc4204",
                    "outline-variant": "#c2c6d8",
                    "error-container": "#ffdad6",
                    "surface-container-highest": "#e1e2ee",
                    "on-surface-variant": "#424656",
                    "on-tertiary-fixed-variant": "#832600",
                    "on-primary-fixed-variant": "#003fa4",
                    "on-primary-fixed": "#001849",
                    "on-primary": "#ffffff",
                    "surface-container": "#ecedfa",
                    "on-error": "#ffffff",
                    "error": "#ba1a1a",
                    "outline": "#727687",
                    "surface-container-low": "#f2f3ff",
                    "inverse-surface": "#2e303a",
                    "surface-tint": "#0054d6",
                    "on-secondary-container": "#4b617d"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "gutter": "16px",
                    "xl": "32px",
                    "lg": "24px",
                    "unit": "8px",
                    "container-margin": "24px",
                    "sm": "8px",
                    "md": "16px",
                    "xs": "4px"
            },
            "fontFamily": {
                    "body-base": ["IBM Plex Sans Arabic"],
                    "display-lg": ["IBM Plex Sans Arabic"],
                    "headline-md": ["IBM Plex Sans Arabic"],
                    "label-bold": ["IBM Plex Sans Arabic"]
            }
          }
        }
      }
    </script>
<style>
        body {
            font-family: 'IBM Plex Sans Arabic', sans-serif;
            background-color: #faf8ff;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-effect {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(225, 226, 238, 0.5);
        }
    </style>
</head>
<body class="flex min-h-screen items-center justify-center p-gutter">
<!-- Background Decorative Elements -->
<div class="fixed inset-0 -z-10 overflow-hidden">
<div class="absolute top-[-10%] right-[-10%] w-[40%] h-[40%] rounded-full bg-primary-fixed/30 blur-[120px]"></div>
<div class="absolute bottom-[-10%] left-[-10%] w-[30%] h-[30%] rounded-full bg-secondary-container/20 blur-[100px]"></div>
</div>
<!-- Login Container -->
<main class="w-full max-w-[480px] space-y-lg animate-in fade-in duration-700">
<!-- Logo & Branding -->
<div class="text-center space-y-sm">
<div class="inline-flex items-center justify-center w-16 h-16 rounded-xl bg-primary-container text-white mb-md shadow-lg shadow-primary/20">
<span class="material-symbols-outlined text-[40px]" data-icon="medical_services">medical_services</span>
</div>
<h1 class="text-primary font-headline-md text-display-lg-mobile md:text-display-lg tracking-tight">ClinicFlow</h1>
<p class="text-on-surface-variant font-body-base text-body-base">مرحباً بك في ClinicFlow</p>
</div>
<!-- Login Card -->
<div class="glass-effect rounded-xl p-lg shadow-xl shadow-on-surface/5 space-y-lg relative overflow-hidden">
<!-- Secure Session Indicator -->
<div class="absolute top-0 right-0 left-0 h-1 bg-surface-container">
<div class="h-full bg-primary-container transition-all duration-1000 ease-out" id="progress-bar" style="width: 0%"></div>
</div>
<div class="flex items-center justify-between">
<h2 class="font-label-bold text-label-bold text-on-surface">تسجيل الدخول</h2>
<div class="flex items-center gap-xs text-secondary font-utility-mono text-utility-mono bg-secondary-container/30 px-sm py-1 rounded-full">
<span class="material-symbols-outlined text-[14px]" data-icon="lock" style="font-variation-settings: 'FILL' 1;">lock</span>
                    Secure Session
                </div>
</div>
<form class="space-y-md" onsubmit="return false">
<!-- Subdomain Field -->
<div class="space-y-xs">
<label class="block text-label-bold font-label-bold text-on-surface-variant text-right" for="subdomain">بريد العيادة الفرعي (Clinic Subdomain)</label>
<div class="relative">
<input class="w-full h-12 px-md pt-2 pb-2 bg-surface-container-lowest border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none text-left" dir="ltr" id="subdomain" placeholder="clinic-name" type="text"/>
<span class="absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant font-body-sm text-body-sm pointer-events-none">.clinicflow.com</span>
</div>
</div>
<!-- Email Field -->
<div class="space-y-xs">
<label class="block text-label-bold font-label-bold text-on-surface-variant text-right" for="email">البريد الإلكتروني (Email)</label>
<input class="w-full h-12 px-md bg-surface-container-lowest border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none text-left" dir="ltr" id="email" placeholder="name@clinic.com" type="email"/>
</div>
<!-- Password Field -->
<div class="space-y-xs">
<div class="flex justify-between items-center">
<label class="block text-label-bold font-label-bold text-on-surface-variant text-right" for="password">كلمة المرور (Password)</label>
<a class="text-primary font-body-sm text-body-sm hover:underline" href="#">نسيت كلمة المرور؟</a>
</div>
<div class="relative">
<input class="w-full h-12 px-md bg-surface-container-lowest border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none text-left" dir="ltr" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-outline hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Remember Me Toggle -->
<div class="flex items-center gap-sm">
<label class="relative inline-flex items-center cursor-pointer">
<input class="sr-only peer" type="checkbox" value=""/>
<div class="w-11 h-6 bg-surface-container-highest peer-focus:outline-none rounded-full peer peer-checked:after:-translate-x-full rtl:peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:start-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary"></div>
<span class="mr-3 text-body-sm font-body-sm text-on-surface">تذكرني</span>
</label>
</div>
<!-- Submit Button -->
<button class="w-full h-12 bg-primary text-white font-label-bold text-label-bold rounded-lg hover:bg-primary-container active:scale-[0.98] transition-all flex items-center justify-center gap-sm shadow-md shadow-primary/20" type="submit">
<span class="material-symbols-outlined" data-icon="login">login</span>
                    دخول
                </button>
</form>
</div>
<!-- Footer Actions -->
<div class="text-center">
<p class="text-on-surface-variant font-body-sm text-body-sm">
                ليس لديك حساب؟ 
                <a class="text-primary font-label-bold text-label-bold hover:underline mr-xs" href="#">سجل عيادتك الآن</a>
</p>
</div>
<!-- Image for medical aesthetic reference -->
<div class="pt-xl opacity-40 grayscale hover:grayscale-0 transition-all duration-700">
<div class="w-full h-24 bg-cover bg-center rounded-xl" data-alt="A clean, high-end medical workstation background showing a minimalist doctor's desk with a stethoscope and a high-tech tablet. The lighting is bright and professional, dominated by soft whites and clinical blues. The atmosphere is calm, trustworthy, and technologically advanced, fitting a premium SaaS healthcare brand." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuD-CU2Q_7vMpEtIRxAM3qSVxi9IChPsvUwStaxv8zOx2Tk4LJkUCLr6yBJMoYyWwp5iHqa3aUPb23r9jsEPONts0_2j37jHXTBB2ByNauNOg4cj02g755Hu0DQVdN95p-Qu_mrTlElZpkKZoT10HAyucR6I4M-6ojtDgtBwTnvpQS3_9emxOadeKWy41lv_xy5UcXxaJ7iFvmk-xefQnsOokkveWefJ4ViMCat-sgEitkV4_PRAwZ-B8acC0s8CnpKyVyRRDF2tx8sJ')"></div>
</div>
</main>
<script>
        // Micro-interaction for secure session indicator
        document.addEventListener('DOMContentLoaded', () => {
            const bar = document.getElementById('progress-bar');
            setTimeout(() => {
                bar.style.width = '100%';
                setTimeout(() => {
                    bar.parentElement.classList.add('opacity-0');
                    bar.parentElement.style.transition = 'opacity 1s ease-in-out';
                }, 1000);
            }, 500);
        });

        // Form Focus Effects
        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.classList.add('scale-[1.01]');
            });
            input.addEventListener('blur', () => {
                input.parentElement.classList.remove('scale-[1.01]');
            });
        });
    </script>
</body></html>
