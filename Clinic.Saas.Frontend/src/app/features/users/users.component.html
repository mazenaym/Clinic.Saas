<section class="page">
  <div class="page-head"><div><h2>المستخدمين</h2><p>إضافة الأطباء والريسبشن وإدارة الفريق.</p></div></div>
  <div class="grid">
    <section class="panel span-4">
      <h3>مستخدم جديد</h3>
      <form class="form-grid" (ngSubmit)="create()">
        <label>الاسم<input name="fullName" [(ngModel)]="form['fullName']" required /></label>
        <label>الإيميل<input name="email" type="email" [(ngModel)]="form['email']" required /></label>
        <label>كلمة المرور<input name="password" type="password" [(ngModel)]="form['password']" required /></label>
        <label>الدور<select name="role" [(ngModel)]="form['role']">@for (role of roles; track role.value) { <option [ngValue]="role.value">{{ role.label }}</option> }</select></label>
        <label>الهاتف<input name="phone" [(ngModel)]="form['phone']" /></label>
        <label>التخصص<input name="specialty" [(ngModel)]="form['specialty']" /></label>
        <button class="span-all" [disabled]="ui.busy()">إضافة</button>
      </form>
    </section>
    <section class="panel span-8">
      <table><thead><tr><th>الاسم</th><th>الإيميل</th><th>الدور</th><th>الحالة</th></tr></thead><tbody>
        @for (u of users(); track u.id) { <tr><td>{{ u.fullName }}<br><span class="muted">{{ u.specialty || '-' }}</span></td><td>{{ u.email }}</td><td><span class="badge">{{ u.role }}</span></td><td>{{ u.isActive ? 'نشط' : 'متوقف' }}</td></tr> }
      </tbody></table>
    </section>
  </div>
</section>
